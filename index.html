<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暖甜間 - 專屬訂購</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-color: #D4A373; 
            --bg-color: #FAEDCD; 
            --text-color: #5E503F; 
            --white: #FEFAE0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 15px;
        }
        input[type="text"], input[type="tel"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; 
        }
        .bagel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #eeddbb;
        }
        .bagel-info {
            display: flex;
            flex-direction: column;
        }
        .bagel-name { font-weight: bold; }
        .bagel-price { font-size: 12px; color: #888; }
        .quantity-control {
            display: flex;
            align-items: center;
        }
        .btn-qty {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }
        .qty-input {
            width: 40px;
            text-align: center;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: bold;
        }
        .info-box {
            background-color: #fdf5e6;
            border-left: 4px solid var(--primary-color);
            padding: 12px 15px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .info-box p {
            margin: 0;
            font-size: 14px;
            color: var(--text-color);
        }
        .info-box-title {
            font-weight: bold;
            margin-bottom: 5px !important;
        }
        .total-section {
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            text-align: right;
            font-size: 18px;
            font-weight: bold;
        }
        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(212, 163, 115, 0.3);
            transition: all 0.3s ease;
        }
        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        .submit-btn:active:not(:disabled) { transform: scale(0.98); }
        #line_user_id { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🥯 暖甜間 專屬訂購</h1>
    <p class="subtitle">新鮮手作，用心烘焙</p>

    <input type="text" id="line_user_id" value="">

    <div class="form-group">
        <label>訂購人姓名</label>
        <input type="text" id="customer_name" placeholder="請輸入姓名" required>
    </div>

    <div class="form-group">
        <label>聯絡電話</label>
        <input type="tel" id="phone" placeholder="0912345678" required>
    </div>

    <div class="form-group">
        <label>希望交貨日 (最快為下單後 3 天)</label>
        <input type="date" id="delivery_date" required>
    </div>

    <div class="form-group">
        <label>🥯 選擇口味與數量</label>
        <div id="menu-container"></div>
    </div>

    <div class="form-group">
        <label>取貨方式</label>
        <select id="shipping_method">
            <option value="面交">面交</option>
            <option value="店到店">店到店 (請在備註填寫縣市與門市)</option>
            <option value="黑貓低溫宅配">黑貓低溫宅配(請在備註填寫收件人姓名/收件地址)</option>
        </select>
    </div>

    <div class="form-group">
        <label>備註 (選填)</label>
        <textarea id="note" rows="3" placeholder="有任何特殊需求請告訴我們~"></textarea>
    </div>

    <div class="info-box">
        <p class="info-box-title">💳 匯款資訊</p>
        <p>訂單成立後再提供匯款資訊</p>
    </div>

    <div class="total-section">
        總金額：$<span id="total_price_display">0</span>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">送出訂單</button>
</div>

<script>
  let dynamicMenu = []; // 用來存儲從 Google 抓來的菜單

    window.onload = function() {
        const btn = document.getElementById('submitBtn');
        btn.innerText = "🔄 讀取最新菜單中...";
        btn.disabled = true;

        // 向大腦請求目前的菜單和營業狀態
        fetch(GOOGLE_SCRIPT_URL)
            .then(response => response.json())
            .then(data => {
                if (data.store_status !== "營業中") {
                    showClosedMessage();
                    return;
                }
                
                // 核心連動：自動畫出菜單
                dynamicMenu = data.menu; 
                renderDynamicMenu(dynamicMenu);
                setupDate();
                initializeLiff();

                btn.innerText = "送出訂單";
                btn.disabled = false;
            });
    };

    function renderDynamicMenu(menuItems) {
        const container = document.getElementById('menu-container');
        container.innerHTML = ""; // 清空舊的
        menuItems.forEach(item => {
            const html = `
                <div class="bagel-item">
                    <div class="bagel-info">
                        <span class="bagel-name">${item.name}</span>
                        <span class="bagel-price">$${item.price}</span>
                    </div>
                    <div class="quantity-control">
                        <button class="btn-qty" onclick="changeQty('${item.name}', -1)">-</button>
                        <input type="text" id="qty_${item.name}" class="qty-input" value="0" readonly>
                        <button class="btn-qty" onclick="changeQty('${item.name}', 1)">+</button>
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    function calculateTotal() {
        let total = 0;
        dynamicMenu.forEach(item => {
            const qty = parseInt(document.getElementById(`qty_${item.name}`).value) || 0;
            total += qty * item.price;
        });
        document.getElementById('total_price_display').innerText = total;
    }
    
    // (其他 submitOrder 內收集資料的邏輯，將原本固定口味改為 loop dynamicMenu 即可)
</script>

</body>
</html>
